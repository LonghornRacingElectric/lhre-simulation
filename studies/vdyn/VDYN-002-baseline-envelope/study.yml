study:
  id: VDYN-002-baseline-envelope
  lane: vdyn
  title: Baseline Envelope
  owner: LHRE Vehicle Dynamics
  status: planned
  decision_question: Does the audited baseline vehicle have enough lateral, acceleration, and braking envelope to justify setup development instead of architecture redesign?
  report_destination: reports/2026-vdyn-design-report.md#baseline-envelope

claim:
  statement: The current architecture has credible baseline dynamic capability.
  why_it_matters: If the baseline envelope is not credible, setup sweeps are premature and the team should revisit architecture, tire, mass, power, brake, or aero assumptions.
  accepted_if: The baseline produces usable lateral, acceleration, and braking envelopes at representative FSAE speeds without exceeding the tire file load range in normal operating cases.
  rejected_if: The baseline is clearly traction-, power-, brake-, or load-range-limited in a way that invalidates setup-level studies.

inputs:
  vehicle_config: ../../../vehicles/current/vehicle.yml
  tire_file: ../../../vehicles/current/tires/16x7p5_10_12psi.tir
  upstream_study: ../VDYN-001-source-vehicle-audit/RESULTS.md
  other_sources: []

fixed_assumptions:
  - Use audited mass, CG, wheelbase, track, tire metadata, and aero map from VDYN-001.
  - Use current vehicle YAML brake, tire, and aero assumptions unless this study explicitly documents an override.
  - Treat this as baseline capability only; setup, tire, and aero sensitivity belong to later studies.

model_assumptions:
  cg_height_m: from_vdyn_001
  front_lltd_fraction: 0.4896
  aero_balance_front_fraction: 0.50
  max_drive_power_w: 80000
  max_drive_force_n: 3735
  drive_distribution_front: 0.0
  max_brake_force_n: 14000
  brake_distribution_front: 0.62
  speeds_mps: [5.0, 10.0, 15.0, 20.0, 25.0]

swept_variables:
  - speed_mps
  - lateral_acceleration_request
  - longitudinal_acceleration_request

metrics:
  - max_lateral_g
  - max_acceleration_g
  - max_braking_g
  - representative_ggv_shape
  - tire_load_range_margin

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots

correlation:
  required_channels:
    - speed
    - longitudinal_acceleration
    - lateral_acceleration
    - steering_angle
    - brake_pressure
    - torque_request
    - wheel_speeds
  test_procedure: Use skidpad, brake events, acceleration events, and early endurance logs to compare measured GG shape to the baseline envelope.
  model_update_if_wrong: Update tire, mass, aero, brake, or power assumptions before promoting setup sensitivity conclusions.
