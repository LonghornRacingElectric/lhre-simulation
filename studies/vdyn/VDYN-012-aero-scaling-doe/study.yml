study:
  id: VDYN-012-aero-scaling-doe
  lane: vdyn
  title: Aero Scaling DOE
  owner: LHRE Vehicle Dynamics / Aero
  status: active
  decision_question: How do aero downforce, drag, and balance scaling affect the dynamic envelope?
  report_destination: reports/2026-vdyn-design-report.md#aero-scaling

claim:
  statement: Aero must be treated as a vehicle dynamics variable because downforce, drag, and balance change the envelope differently.
  why_it_matters: Aero decisions affect lateral capability, high-speed acceleration, braking load, and balance.
  accepted_if: EnvelopeSim can rank downforce, drag, and aero-balance effects at representative speeds.
  rejected_if: Aero scaling cannot be connected to envelope metrics.

inputs:
  upstream_study: ../VDYN-002-baseline-envelope/RESULTS.md

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
