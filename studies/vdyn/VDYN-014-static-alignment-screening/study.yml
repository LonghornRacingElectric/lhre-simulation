study:
  id: VDYN-014-static-alignment-screening
  lane: vdyn
  title: Static Alignment Screening
  owner: LHRE Vehicle Dynamics
  status: active
  decision_question: Which static alignment variables are likely to matter before running full StandardSim alignment sweeps?
  report_destination: reports/2026-vdyn-design-report.md#static-alignment

claim:
  statement: Static camber and toe should be treated as correlated tire-response variables, not arbitrary setup numbers.
  why_it_matters: Alignment changes tire stiffness, effective slip angle, drag/scrub, temperatures, and driver feel.
  accepted_if: Tire-file camber sensitivity and toe-induced slip preload can be screened analytically.
  rejected_if: Tire coefficients are missing.

inputs:
  tire_file: ../../../vehicles/current/tires/16x7p5_10_12psi.tir

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
