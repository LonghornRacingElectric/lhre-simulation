study:
  id: VDYN-007-tire-pure-slip-curves
  lane: vdyn
  title: Tire Pure Slip Curves
  owner: LHRE Vehicle Dynamics
  status: active
  decision_question: What pure-slip force curves does the baseline tire file imply at representative loads?
  report_destination: reports/2026-vdyn-design-report.md#tires

claim:
  statement: The tire source supports a load-dependent picture of lateral and longitudinal force generation, not just a peak-mu scalar.
  why_it_matters: Driver response and setup choices depend on stiffness and curve shape before peak force.
  accepted_if: Pure lateral and longitudinal screening curves can be generated at representative loads.
  rejected_if: Required Magic Formula coefficients are missing.

inputs:
  tire_file: ../../../vehicles/current/tires/16x7p5_10_12psi.tir

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
