study:
  id: VDYN-015-envelopesim-interaction-doe
  lane: vdyn
  title: EnvelopeSim Interaction DOE
  owner: Vehicle Dynamics
  status: active
  decision_question: Which paired variables interact strongly enough to change vehicle-level envelope conclusions?
  report_destination: reports/2026-vdyn-design-report.md#envelopesim-interaction-doe

claim:
  statement: The dynamic envelope is governed by paired interactions, not only one-factor sensitivities.
  why_it_matters: Setup and architecture decisions rarely move one variable at a time; judges should see which coupled choices actually matter.
  accepted_if: The DOE produces interaction surfaces for tire-aero, drive-drag, brake-CG, and LLTD-aero balance with ranked spans.
  rejected_if: Paired sweeps do not reveal actionable interaction priorities beyond the one-factor DOE.

inputs:
  baseline_envelope_runner: ../VDYN-002-baseline-envelope/run.py
  source_audit: ../VDYN-001-source-vehicle-audit/outputs/summary.csv
  vehicle_config: ../../../vehicles/current/vehicle.yml
  tire_file: ../../../vehicles/current/tires/16x7p5_10_12psi.tir

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
