study:
  id: VDYN-003-standardsim-baseline
  lane: vdyn
  title: StandardSim Baseline Ingestion
  owner: LHRE Vehicle Dynamics
  status: active
  decision_question: Does the full StandardSim baseline support the claim that the vehicle is mild, quick, and mechanically tunable?
  report_destination: reports/2026-vdyn-design-report.md#standardsim-baseline

claim:
  statement: Existing StandardSim outputs support setup development rather than architecture redesign.
  why_it_matters: The first-principles envelope is not enough; the report needs full-model steady-state, transient, and four-post evidence.
  accepted_if: SteadyStateEval, TransientEval, and FourPostEval metrics are present and contain the baseline response metrics needed by the report.
  rejected_if: Any required StandardSim metric file is missing or lacks required fields.

inputs:
  steady_state_metrics: ../../../BobSim/_3_StandardSim/results/steady_state_eval_report_metrics.csv
  transient_metrics: ../../../BobSim/_3_StandardSim/results/transient_eval_report_metrics.csv
  four_post_metrics: ../../../BobSim/_3_StandardSim/results/four_post_eval_report_metrics.csv

fixed_assumptions:
  - This study ingests existing StandardSim result artifacts; it does not rebuild or rerun the Modelica simulations.
  - A later rerun study should be added if the team changes vehicle.yml, BobLib records, or StandardSim configurations.

swept_variables: []

metrics:
  - understeer_gradient_deg_per_g
  - roll_gradient_deg_per_g
  - ay_rise_time_s
  - yaw_rise_time_s
  - ay_overshoot_pct
  - yaw_overshoot_pct
  - avg_lltd_front_pct
  - motion_ratio_front
  - motion_ratio_rear
  - toe_gain_roll_rad_per_rad

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots

correlation:
  required_channels:
    - steering_angle
    - yaw_rate
    - lateral_acceleration
    - speed
    - driver_comment
    - setup_state
  test_procedure: Compare first-drive step/sine steer, steady-state cornering, and setup brackets to the ingested StandardSim metrics.
  model_update_if_wrong: Update tire relaxation, tire stiffness, damping, ARB rates, alignment propagation, or mass properties before using StandardSim for setup choice.
