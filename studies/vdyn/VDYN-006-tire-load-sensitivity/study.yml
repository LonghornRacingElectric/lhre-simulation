study:
  id: VDYN-006-tire-load-sensitivity
  lane: vdyn
  title: Tire Load Sensitivity
  owner: LHRE Vehicle Dynamics
  status: active
  decision_question: How do the baseline tire peak friction assumptions vary across the vertical-load range used by the vehicle model?
  report_destination: reports/2026-vdyn-design-report.md#tires

claim:
  statement: Tire load sensitivity is large enough to affect mass, aero, LLTD, and setup decisions.
  why_it_matters: Load transfer and aero only help if the tire model turns normal load into usable force in a predictable way.
  accepted_if: The tire file can produce load-sensitive longitudinal and lateral peak force curves across its valid load range.
  rejected_if: Tire coefficients are missing or force curves cannot be generated.

inputs:
  tire_file: ../../../vehicles/current/tires/16x7p5_10_12psi.tir
  vdyn_load_cases: ../VDYN-002-baseline-envelope/outputs/tire_load_range_check.csv

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
