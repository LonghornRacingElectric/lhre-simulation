study:
  id: AERO-001-map-and-reference-audit
  lane: aero
  title: Aero Map And Reference Audit
  owner: LHRE Aero / Vehicle Dynamics
  status: active
  decision_question: Is the aero map referenced to defensible vehicle geometry, dimensions, and sign conventions before aero performance claims are made?
  report_destination: reports/2026-aero-design-report.md#map-and-reference-audit

claim:
  statement: The vehicle YAML aero map is internally coherent and referenced to the intended lower-inboard chassis points.
  why_it_matters: Downforce, drag, balance, and platform sensitivity claims are not meaningful until the map shape, reference points, and sign conventions are audited.
  accepted_if: Ride-height grids are monotonic, force/moment tables match grid dimensions, lower-inboard reference points match the YAML aero references, and baseline force coefficients can be computed.
  rejected_if: Any table has the wrong shape, references disagree with the intended hardpoints, or force/moment signs are ambiguous.

inputs:
  vehicle_config: ../../../vehicles/current/vehicle.yml
  upstream_study: ../../vdyn/VDYN-001-source-vehicle-audit/RESULTS.md
  other_sources: []

fixed_assumptions:
  - The aero map is symmetric left/right and parameterized only by front and rear ride height.
  - Positive downforce table entries mean increased normal load.
  - Positive drag table entries mean rearward drag magnitude.
  - Free pitch moment is interpreted about aero_ref_m as stored in vehicle.yml.

swept_variables: []

metrics:
  - map_shape_valid
  - front_reference_error_m
  - rear_reference_error_m
  - baseline_downforce_n
  - baseline_drag_n
  - baseline_cl_a_m2
  - baseline_cd_a_m2
  - downforce_range_n
  - drag_range_n
  - equivalent_vertical_load_x_range_m

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots

correlation:
  required_channels:
    - speed
    - ride_height_front
    - ride_height_rear
    - longitudinal_acceleration
    - lateral_acceleration
    - pack_power
  test_procedure: Use coastdown, aero-on/off comparison, and ride-height-vs-speed data to validate drag and downforce trends.
  model_update_if_wrong: Correct aero map signs, reference point, coefficient scaling, or front/rear load split before running aero sensitivity studies.
