study:
  id: DE-006-judge-question-bank
  lane: design-event
  title: Judge Question Bank Coverage
  owner: LHRE Systems / Vehicle Dynamics
  status: active
  decision_question: Does the report package answer the uploaded judge-question set, and where does it need test or owner evidence?
  report_destination: reports/2026-judge-question-bank.md

claim:
  statement: The design package can be defended question-by-question, with model-backed answers separated from test gaps and subsystem-owner handoffs.
  why_it_matters: Judges ask across subsystem boundaries; the team needs prepared answers, evidence references, and honest validation closure.
  accepted_if: Every uploaded question cluster maps to an answer stance, evidence source, and next closure action.
  rejected_if: Any topic is unmapped or presented as proven without evidence.

inputs:
  vdyn_report: ../../../reports/2026-vdyn-design-report.md
  aero_report: ../../../reports/2026-aero-design-report.md
  chassis_report: ../../../reports/2026-chassis-design-report.md
  design_index: ../../../reports/2026-design-report-index.md
  standardsim_steady: ../../../BobSim/_3_StandardSim/results/steady_state_eval_report_metrics.csv
  standardsim_transient: ../../../BobSim/_3_StandardSim/results/transient_eval_report_metrics.csv
  standardsim_fourpost: ../../../BobSim/_3_StandardSim/results/four_post_eval_report_metrics.csv

outputs:
  results_markdown: RESULTS.md
  report_markdown: ../../../reports/2026-judge-question-bank.md
  data_dir: outputs
  figures_dir: plots
