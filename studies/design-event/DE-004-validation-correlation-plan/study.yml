study:
  id: DE-004-validation-correlation-plan
  lane: design-event
  title: Validation And Correlation Plan
  owner: LHRE Systems / LV-DAQ
  status: active
  decision_question: What tests and channels are required to turn the current model claims into correlated vehicle claims?
  report_destination: reports/2026-design-report-index.md#validation-and-correlation

claim:
  statement: Every major report claim has a defined physical validation test, required channels, and model update action.
  why_it_matters: Judges will trust the package when the team can explain exactly how the first car will correct the model.
  accepted_if: Each high-level model claim maps to a test, channel set, pass/fail metric, and model update action.
  rejected_if: Any claim depends on data the car does not plan to collect.

inputs:
  requirements_traceability: ../DE-002-requirements-traceability/outputs/requirements_traceability.csv
  interface_control_matrix: ../DE-003-interface-control-matrix/outputs/interface_control_matrix.csv

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
