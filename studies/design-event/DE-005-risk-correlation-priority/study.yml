study:
  id: DE-005-risk-correlation-priority
  lane: design-event
  title: Risk And Correlation Priority
  owner: LHRE Systems
  status: active
  decision_question: Which uncertain variables are most likely to change the vehicle conclusion, and what should be correlated first?
  report_destination: reports/2026-design-report-index.md#risk-and-correlation-priority

claim:
  statement: The team knows which assumptions matter most and has ranked them for correlation.
  why_it_matters: OEM-style analysis does not stop at sensitivity plots; it turns sensitivity, uncertainty, and detectability into a validation priority.
  accepted_if: The dominant risk variables are ranked by severity, uncertainty, detectability, and assigned to correlation actions.
  rejected_if: The package cannot distinguish high-impact assumptions from low-impact details.

