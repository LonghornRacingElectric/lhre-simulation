  aero_doe: ../../vdyn/VDYN-012-aero-scaling-doe/outputs
  torsional_stiffness: ../../vdyn/VDYN-013-torsional-stiffness-authority/outputs
  static_alignment: ../../vdyn/VDYN-014-static-alignment-screening/outputs
  envelopesim_interactions: ../../vdyn/VDYN-015-envelopesim-interaction-doe/outputs
  standardsim_response_surface: ../../vdyn/VDYN-016-standardsim-response-surface-doe/outputs
  hardpoint_tolerance: ../../vdyn/VDYN-017-hardpoint-monte-carlo-tolerance/outputs

