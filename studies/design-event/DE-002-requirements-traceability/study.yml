study:
  id: DE-002-requirements-traceability
  lane: design-event
  title: Requirements Traceability Matrix
  owner: LHRE Systems / Vehicle Dynamics
  status: active
  decision_question: Can the vehicle be defended from team goals through subsystem requirements, study evidence, and validation closure?
  report_destination: reports/2026-design-report-index.md#requirements-traceability

claim:
  statement: The design package is an end-to-end requirements cascade, not a collection of disconnected simulations.
  why_it_matters: OEM-level design reviews require every major claim to trace back to a requirement, owner, evidence artifact, and verification method.
  accepted_if: Each major vehicle requirement has a named owner, source study, verification method, and current evidence status.
  rejected_if: Any high-level vehicle claim lacks a requirement, owner, or validation path.

inputs:
  vdyn_report: ../../../reports/2026-vdyn-design-report.md
  aero_report: ../../../reports/2026-aero-design-report.md
  chassis_report: ../../../reports/2026-chassis-design-report.md
  rubric_crosswalk: ../DE-001-rubric-crosswalk/outputs/rubric_crosswalk.csv

outputs:
  results_markdown: RESULTS.md
  data_dir: outputs
  figures_dir: plots
